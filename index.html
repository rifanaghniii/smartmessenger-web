<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>❤️ Smart Messenger</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- ================= HEADER ================= -->

    <header>
      <div class="logo">❤️ Smart Messenger</div>

      <div class="status-container">
        <div class="status-card">
          <span class="dot offline" id="brokerStatus"></span>

          <span id="brokerText">Disconnected</span>
        </div>

        <div class="status-card">
          <span class="dot offline" id="espDot"></span>

          <span id="espStatus">Offline</span>
        </div>
      </div>
    </header>

    <!-- ================= CONTENT ================= -->

    <main>
      <!-- LEFT -->

      <section class="card send-card">
        <h2>💌 Kirim Pesan</h2>

        <label> Nama Pengirim </label>

        <input type="text" id="sender" placeholder="Contoh : Babyyy" />

        <label> Pesan </label>

        <textarea
          id="message"
          placeholder="Tulis pesan romantis disini..."
        ></textarea>

        <button id="sendBtn">🚀 Kirim Pesan</button>

        <div class="last-send">
          <h3>Pesan Terakhir</h3>

          <div id="lastMessage">Belum ada pesan.</div>
        </div>
      </section>

      <!-- RIGHT -->

      <section class="card reply-card">
        <h2>❤️ Balasan ESP32</h2>

        <div class="reply-container" id="replyContainer"></div>
      </section>
    </main>

    <!-- ================= FOOTER ================= -->

    <footer>Smart Messenger © 2026</footer>

    <!-- ================= MQTT ================= -->

    <script src="mqtt.min.js"></script>

    <script src="mqtt.js"></script>

    <script src="script.js"></script>
  </body>
</html>
